name: Release build

# Manual trigger or push a version tag like v0.1.0
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/upload.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest

      - name: Build release bundle
        run: ./gradlew bundleRelease

      - name: Upload signed AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Auto-upload to Google Play is DISABLED until a Play service account is configured.
      # To enable: add secret PLAY_SERVICE_ACCOUNT_JSON and remove `if: false`.
      - name: Upload to Google Play (internal track)
        if: false
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.lmfd.warboss
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          whatsNewDirectory: distribution/whatsnew
